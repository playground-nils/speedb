name: Fuzz Test
'on':
  workflow_dispatch: null
  workflow_call: null
jobs:
  Fuzz:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:18.04
    strategy:
      matrix:
        include:
        - name: db_fuzzer
        - name: db_map_fuzzer
    steps:
    - name: Pre-build
      run: '#echo "nameserver 8.8.8.8" > /etc/resolv.conf

        apt update && apt install -y python3 git clang-tools cmake make automake ucommon-utils
        libtool gettext pkg-config build-essential clang-10 zlib1g-dev libbz2-dev
        ninja-build liblzma-dev autoconf libsnappy-dev libzstd-dev liblz4-dev binutils
        m4 g++-10 unzip

        '
    - uses: actions/checkout@v3
    - name: ${{ matrix.name }}
      run: "echo 'git clone https://github.com/google/libprotobuf-mutator.git \\n\n\
        \  cd libprotobuf-mutator \\n\n  git checkout ffd86a32874e5c08a143019aad1aaf0907294c9f\
        \ \\n\n  cd .. \\n\n  export CC=clang && export CXX=clang++ && mkdir LPM &&\
        \ cd LPM \\n\n  ln -s /usr/lib/x86_64-linux-gnu/libstdc++.so.6 /usr/lib/x86_64-linux-gnu/libstdc++.so\
        \ \\n\n  ln -s /usr/bin/clang-10 /usr/bin/clang \\n\n  ln -s /usr/bin/clang++-10\
        \ /usr/bin/clang++ \\n\n  cmake ../libprotobuf-mutator -GNinja -DLIB_PROTO_MUTATOR_DOWNLOAD_PROTOBUF=ON\
        \ -DLIB_PROTO_MUTATOR_TESTING=OFF -DCMAKE_BUILD_TYPE=Release \\n\n  ninja\
        \ \\n\n  ninja install \\n\n  export PKG_CONFIG_PATH=$PWD:$PWD/external.protobuf/lib/pkgconfig/\
        \ \\n\n  export PATH=$PWD/external.protobuf/bin:$PATH \\n\n  cd $GITHUB_WORKSPACE\
        \ \\n\n  COMPILE_WITH_ASAN=1 PORTABLE=1 make -j$(nproc) static_lib \\n\n \
        \ cd $GITHUB_WORKSPACE/fuzz \\n\n  make ${{ matrix.name }} \\n\n  ls -alFh\
        \ $GITHUB_WORKSPACE/fuzz/ \\n\n  echo ASAN_OPTIONS=detect_leaks=0 ./db_fuzzer\
        \ \\n' > prepfuz.sh\nchmod +x prepfuz.sh\nbash -xv prepfuz.sh\nmkdir -p $GITHUB_WORKSPACE/out/\n\
        ASAN_OPTIONS=detect_odr_violation=0 $GITHUB_WORKSPACE/fuzz/${{ matrix.name\
        \ }} 2>&1 | tee $GITHUB_WORKSPACE/out/${{ matrix.name }}.log\ntail -20 $GITHUB_WORKSPACE/out/${{\
        \ matrix.name }}.log | grep \"==AddressSanitizer. Thread limit (4194304 threads)\
        \ exceeded\\. Dying\\.\" || { echo \"${{ matrix.name }} failed!\" && false;\
        \ }\n"
